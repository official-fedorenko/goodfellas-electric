<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <script src="./scripts/main.js" defer></script>
    <title>Goodfellas Electric</title>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <h1 class="logo">
            <svg width="320" height="90" viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Electro Modus logo">
            <defs>
                <linearGradient id="electroModusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="100%" stop-color="#7a7a7a" />
                </linearGradient>

                <filter id="electroModusGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="2.2" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
                </filter>
            </defs>

            <!-- Вся композиция центрируется относительно SVG -->
            <g transform="translate(160,45)">
                <!-- Молния -->
                <path
                d="M-115 -20
                    L-128 4
                    L-113 4
                    L-126 30
                    L-91 -2
                    L-106 -2
                    L-93 -20 Z"
                fill="url(#electroModusGrad)"
                filter="url(#electroModusGlow)"
                />

                <!-- Верхняя строка -->
                <text
                x="15"
                y="-2"
                text-anchor="middle"
                font-family="Segoe UI, Arial, sans-serif"
                font-size="26"
                font-weight="700"
                letter-spacing="0.5"
                fill="url(#electroModusGrad)"
                filter="url(#electroModusGlow)"
                >
                Electro
                </text>

                <!-- Нижняя строка -->
                <text
                x="15"
                y="24"
                text-anchor="middle"
                font-family="Segoe UI, Arial, sans-serif"
                font-size="24"
                font-weight="400"
                letter-spacing="1.8"
                fill="#cfcfcf"
                >
                Modus
                </text>

                <!-- Нижняя линия -->
                <line
                x1="-55"
                y1="34"
                x2="85"
                y2="34"
                stroke="rgba(255,255,255,0.45)"
                stroke-width="1.5"
                />
            </g>
            </svg>
            </h1>

            <nav class="nav">
                <div class="nav-group">
                    <a href="#" class="nav-link active" data-page="home">Главная</a>
                    <a href="#" class="nav-link" data-page="services">Услуги</a>
                    <a href="#" class="nav-link" data-page="prices">Цены</a>
                    <a href="#" class="nav-link" data-page="contacts">Контакты</a>
                    <a href="#" class="nav-link" data-page="clients">Клиенты</a>
                </div>
            </nav>

            <div class="sidebar-bottom">
                <a href="#" class="nav-link" data-page="settings">Настройки</a>
                <a href="#" class="nav-link" data-page="logout">Выход</a>
            </div>
        </aside>

        <div class="overlay" id="overlay"></div>

        <main class="content">
            <div class="content-inner" id="content">
                <!-- тут контент -->
            </div>
        </main>

        <footer class="footer">
            <span class="footer-copy">&copy; 2024 Goodfellas Electric. Все права защищены.</span>
            <button class="menu-toggle" id="menuToggle" aria-label="Открыть меню">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </footer>
    </div>
</body>
</html>
